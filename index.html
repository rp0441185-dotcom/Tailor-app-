<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tailor Manager Pro</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; margin:0; background:#111; color:white; }
.hidden{display:none;}

input,button,textarea{
  width:90%; padding:10px; margin:5px;
  border-radius:8px; border:none;
}

button{background:#c9a84c; color:black; font-weight:bold;}

.card{
  margin:10px; padding:10px;
  border-radius:10px;
}

.red{background:#c0392b;}
.yellow{background:#d4ac0d; color:black;}
.green{background:#1e8449;}

.top{background:#000; padding:10px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="appPage" class="hidden">

<div class="top">
  Tailor App
  <button onclick="logout()" style="float:right;">Logout</button>
</div>

<div>
  <input id="name" placeholder="Name">
  <input id="phone" placeholder="Phone">
  <input id="date" type="date">
  <textarea id="notes" placeholder="Notes"></textarea>
  <button onclick="addCustomer()">Add</button>
</div>

<input id="search" placeholder="Search..." oninput="render()">

<div id="list"></div>

</div>

<script>
/* 🔥 YOUR FIREBASE CONFIG HERE */
const firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "PASTE",
  projectId: "PASTE",
  storageBucket: "PASTE",
  messagingSenderId: "PASTE",
  appId: "PASTE"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let data = [];

auth.onAuthStateChanged(user=>{
  if(user){
    loginPage.classList.add("hidden");
    appPage.classList.remove("hidden");
    load();
  }else{
    loginPage.classList.remove("hidden");
    appPage.classList.add("hidden");
  }
});

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .catch(e=>alert(e.message));
}

function logout(){
  auth.signOut();
}

function addCustomer(){
  db.collection("customers").add({
    name:name.value,
    phone:phone.value,
    date:date.value,
    notes:notes.value,
    created:Date.now()
  });
}

function load(){
  db.collection("customers")
  .orderBy("created","desc")
  .onSnapshot(snap=>{
    data=[];
    snap.forEach(d=>{
      data.push({id:d.id,...d.data()});
    });
    render();
  });
}

function getColor(days){
  if(days<=3) return "red";
  if(days<=10) return "yellow";
  return "green";
}

function render(){
  let list=document.getElementById("list");
  list.innerHTML="";

  let searchVal = search.value?.toLowerCase() || "";

  data.forEach(d=>{
    let days = Math.ceil((new Date(d.date)-new Date())/(1000*60*60*24));

    if(!d.name.toLowerCase().includes(searchVal) &&
       !d.phone.includes(searchVal)) return;

    list.innerHTML+=`
    <div class="card ${getColor(days)}">
      <b>${d.name}</b><br>
      📞 ${d.phone}<br>
      📅 ${d.date} (${days} days)<br>
      📝 ${d.notes}<br><br>
      <button onclick="del('${d.id}')">Delete</button>
    </div>`;
  });
}

function del(id){
  db.collection("customers").doc(id).delete();
}

    projectId: "alteration-cce0d",
    storageBucket: "alteration-cce0d.firebasestorage.app",
    messagingSenderId: "854899088875",
    appId: "1:854899088875:web:ba2f97f6c8056cb32f0dae",
    measurementId: "G-TQ6195PST4"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
</script>
</body>
</html>
